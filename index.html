<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoUni Tech Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gouni: {
                primary: '#1e3a8a',
                secondary: '#fbbf24',
                dark: '#0f172a',
                light: '#fafafa'
              },
              surface: {
                DEFAULT: '#ffffff',
                hover: '#fafafa',
                muted: '#f5f5f5',
                border: '#e5e5e5',
              }
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '16px',
              '3xl': '20px',
            },
            boxShadow: {
              'card': '0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02)',
              'card-hover': '0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04)',
              'float': '0 20px 60px rgba(0,0,0,0.1)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fafafa;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4d4;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a3a3a3;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fadeUp 0.4s ease-out forwards;
      }
      .animate-fade-up-delay-1 { animation-delay: 0.05s; opacity: 0; }
      .animate-fade-up-delay-2 { animation-delay: 0.1s; opacity: 0; }
      .animate-fade-up-delay-3 { animation-delay: 0.15s; opacity: 0; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(100%); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up {
        animation: slideUp 0.35s ease-out forwards;
      }

      /* Hide scrollbar utility */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Custom Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffffff;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .logo-container {
        position: relative;
        width: 400px;
        height: 400px;
        overflow: hidden;
      }

      .logo-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .logo-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        top: 0;
        left: 0;
      }

      .logo-masked {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        clip-path: circle(0% at 50% 50%);
        animation: maskReveal 4s ease-in-out infinite;
      }

      @keyframes maskReveal {
        0% {
          clip-path: circle(0% at 50% 50%);
        }
        40% {
          clip-path: circle(70% at 50% 50%);
        }
        85% {
          clip-path: circle(70% at 50% 50%);
        }
        100% {
          clip-path: circle(0% at 50% 50%);
        }
      }

      .title {
        position: absolute;
        top: -50px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 2px;
        z-index: 10;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="loading-screen">
      <div class="logo-container">
        <div class="title">GoBoard</div>
        <div class="logo-wrapper">
          <img class="logo-image logo-masked" src="./customloading/logo-white-black.png" alt="GoBoard Logo">
        </div>
      </div>
    </div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
